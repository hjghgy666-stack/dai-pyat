    <script>
        (function() {
            // ==================== ОРИЕНТАЦИЯ ====================
            function checkOrientation() {
                const warning = document.getElementById('orientation-warning');
                const appEl = document.getElementById('app');
                const isPortrait = window.innerWidth < window.innerHeight;
                if (!isPortrait && window.innerWidth < 1024) {
                    warning.style.display = 'flex';
                    appEl.style.display = 'none';
                } else {
                    warning.style.display = 'none';
                    appEl.style.display = '';
                }
            }

            async function lockOrientation() {
                try {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('portrait').catch(() => {});
                    }
                } catch (e) {}
            }

            lockOrientation();
            checkOrientation();
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', () => {
                setTimeout(checkOrientation, 100);
                setTimeout(() => { if (gameRunning) updateBallPosition(); }, 300);
            });

            // ==================== DOM ====================
            const menuScreen = document.getElementById('menu-screen');
            const gameScreen = document.getElementById('game-screen');
            const leaderboardScreen = document.getElementById('leaderboard-screen');
            const settingsScreen = document.getElementById('settings-screen');
            const btnPlay = document.getElementById('btn-play');
            const btnMusic = document.getElementById('btn-music');
            const btnOpenLb = document.getElementById('btn-open-lb');
            const btnCloseLb = document.getElementById('btn-close-lb');
            const btnOpenSettings = document.getElementById('btn-open-settings');
            const btnCloseSettings = document.getElementById('btn-close-settings');
            const menuPlayerName = document.getElementById('menu-player-name');
            const menuRecordValue = document.getElementById('menu-record-value');
            const nameInput = document.getElementById('name-input');
            const btnSaveName = document.getElementById('btn-save-name');
            const saveConfirm = document.getElementById('save-confirm');
            const container = document.getElementById('game-container');
            const ball = document.getElementById('ball');
            const currentScoreEl = document.getElementById('current-score');
            const hudRecord = document.getElementById('hud-record');
            const particlesContainer = document.getElementById('particles-container');
            const hint = document.getElementById('hint');
            const gameOverInline = document.getElementById('game-over-inline');
            const goFinalScore = document.getElementById('go-final-score');
            const goNewRecord = document.getElementById('go-new-record');
            const goRetry = document.getElementById('go-retry');
            const goMenu = document.getElementById('go-menu');
            const laneElements = document.querySelectorAll('.lane');
            const lbPlayerCard = document.getElementById('lb-player-card');
            const lbPlayerName = document.getElementById('lb-player-name');
            const lbPlayerRankTag = document.getElementById('lb-player-rank-tag');
            const lbPlayerScore = document.getElementById('lb-player-score');
            const lbList = document.getElementById('lb-list');
            const lbEmpty = document.getElementById('lb-empty');
            const adBannerContainer = document.getElementById('ad-banner-container');

            // ==================== РЕКЛАМА ====================
            let adLoaded = false;
            let bannerClosed = false;

            (function loadYandexAd() {
                const script = document.createElement('script');
                script.src = 'https://yandex.ru/ads/system/context.js';
                script.async = true;
                script.onload = function() {
                    console.log('✅ Яндекс реклама загружена');
                    adLoaded = true;
                    renderBanner();
                };
                script.onerror = function() {
                    console.log('⚠️ Не удалось загрузить рекламу');
                };
                document.head.appendChild(script);
            })();

            function renderBanner() {
                if (!adLoaded || bannerClosed) return;
                try {
                    window.Ya.Context.AdvManager.render({
                        "blockId": "R-M-19173547-1",
                        "type": "floorAd",
                        "platform": "touch",
                        "renderTo": "yandex_rtb_R-M-19173547-1"
                    }, {
                        "onRender": function() {
                            console.log('📢 Баннер показан');
                        },
                        "onError": function(error) {
                            console.log('⚠️ Ошибка баннера:', error);
                        }
                    });
                } catch (e) {
                    console.log('⚠️ Ошибка рендера:', e);
                }
            }

            window.closeBanner = function() {
                bannerClosed = true;
                adBannerContainer.style.display = 'none';
                const gs = document.getElementById('game-screen');
                if (gs) gs.style.paddingBottom = '0';
                setTimeout(() => {
                    bannerClosed = false;
                    renderBanner();
                    const gs2 = document.getElementById('game-screen');
                    if (gs2 && !gs2.classList.contains('screen-hidden')) {
                        adBannerContainer.style.display = 'flex';
                        gs2.style.paddingBottom = '50px';
                    }
                }, 60000);
            };

            // ==================== МУЗЫКА ====================
            let musicCtx = null;
            let musicGain = null;
            let musicPlaying = false;
            let musicTimer = null;

            function createMusicContext() {
                if (musicCtx) return true;
                try {
                    musicCtx = new(window.AudioContext || window.webkitAudioContext)();
                    musicGain = musicCtx.createGain();
                    musicGain.connect(musicCtx.destination);
                    musicGain.gain.value = 0.06;
                    console.log('🎵 AudioContext создан, sampleRate:', musicCtx.sampleRate);
                    return true;
                } catch (e) {
                    console.error('Ошибка AudioContext:', e);
                    return false;
                }
            }

            function playBeat() {
                if (!musicPlaying || !musicCtx || !musicGain) return;
                const t = musicCtx.currentTime;
                const beatLen = 60 / 130;

                function note(freq, type, start, dur, vol) {
                    if (!musicCtx || !musicGain) return;
                    try {
                        const o = musicCtx.createOscillator();
                        const g = musicCtx.createGain();
                        o.type = type;
                        o.frequency.value = freq;
                        g.gain.setValueAtTime(0, start);
                        g.gain.linearRampToValueAtTime(vol, start + 0.003);
                        g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
                        o.connect(g);
                        g.connect(musicGain);
                        o.start(start);
                        o.stop(start + dur);
                    } catch (e) {}
                }

                for (let i = 0; i < 8; i++) {
                    const bt = t + i * beatLen;
                    note(60, 'sine', bt, 0.12, 0.09);
                    note(100, 'triangle', bt, 0.06, 0.03);
                    note(600, 'white', bt, 0.02, 0.015);
                    if (i % 2 === 0) note(400, 'white', bt, 0.03, 0.02);
                    if (i === 2 || i === 6) {
                        note(180, 'triangle', bt, 0.06, 0.02);
                        note(500, 'white', bt, 0.04, 0.015);
                    }
                }

                const bass = [130.81, 130.81, 146.83, 130.81, 174.61, 164.81, 146.83, 130.81];
                for (let i = 0; i < 8; i++) {
                    note(bass[i], 'square', t + i * beatLen, 0.15, 0.025);
                }

                const loopLen = beatLen * 8;
                musicTimer = setTimeout(() => playBeat(), loopLen * 1000 - 30);
            }

            function startMusic() {
                if (!createMusicContext()) {
                    alert('Не удалось запустить аудио. Попробуйте обновить страницу.');
                    return;
                }
                if (musicCtx.state === 'suspended') {
                    musicCtx.resume();
                }
                setTimeout(() => {
                    if (musicCtx && musicCtx.state !== 'running') {
                        console.warn('AudioContext всё ещё в состоянии:', musicCtx.state);
                    }
                    musicPlaying = true;
                    musicGain.gain.value = 0.06;
                    playBeat();
                    updateMusicButton();
                    console.log('🎵 Музыка запущена!');
                }, 100);
            }

            function stopMusic() {
                musicPlaying = false;
                if (musicTimer) {
                    clearTimeout(musicTimer);
                    musicTimer = null;
                }
                updateMusicButton();
            }

            function toggleMusic() {
                if (musicPlaying) {
                    stopMusic();
                } else {
                    startMusic();
                }
            }

            function updateMusicButton() {
                if (musicPlaying) {
                    btnMusic.textContent = '🎵 МУЗЫКА: ВКЛ';
                    btnMusic.classList.add('on');
                } else {
                    btnMusic.textContent = '🎵 МУЗЫКА: ВЫКЛ';
                    btnMusic.classList.remove('on');
                }
            }

            // ==================== ЗВУКИ ИГРЫ ====================
            let sfxCtx = null;

            function getSfxCtx() {
                if (!sfxCtx) {
                    try {
                        sfxCtx = new(window.AudioContext || window.webkitAudioContext)();
                    } catch (e) {}
                }
                if (sfxCtx && sfxCtx.state === 'suspended') sfxCtx.resume();
                return sfxCtx;
            }

            function playSound(freq, type, duration, vol = 0.08, glideTo = null) {
                const ctx = getSfxCtx();
                if (!ctx) return;
                try {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    if (glideTo) osc.frequency.linearRampToValueAtTime(glideTo, ctx.currentTime + duration);
                    gain.gain.setValueAtTime(vol, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {}
            }

            function soundPerfect() { playSound(880, 'sine', 0.12, 0.12, 1760);
                setTimeout(() => playSound(1200, 'sine', 0.08, 0.06), 100); }

            function soundGood() { playSound(400, 'triangle', 0.1, 0.08); }

            function soundMiss() { playSound(50, 'sawtooth', 0.3, 0.06, 20);
                playSound(30, 'square', 0.25, 0.06, 15); }

            function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

            // ==================== ДАННЫЕ ====================
            const STORAGE_KEY = 'dai_pyat_data';
            const LEADERBOARD_KEY = 'dai_pyat_leaderboard';
            const MUSIC_KEY = 'dai_pyat_music_on';

            function loadPlayerData() {
                try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch (
                e) {}
                return { name: 'Игрок', record: 0, gamesPlayed: 0 };
            }

            function savePlayerData(data) {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
            }

            function loadLeaderboard() {
                try { const raw = localStorage.getItem(LEADERBOARD_KEY); if (raw) return JSON.parse(raw); } catch (
                e) {}
                return generateFakeLeaderboard(0);
            }

            function saveLeaderboard(lb) {
                try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(lb)); } catch (e) {}
            }

            function loadMusicPref() {
                try { return localStorage.getItem(MUSIC_KEY) === 'true'; } catch (e) { return false; }
            }

            function saveMusicPref(on) {
                try { localStorage.setItem(MUSIC_KEY, on ? 'true' : 'false'); } catch (e) {}
            }

            const FAKE_NAMES_POOL = [
                'ProGamer', 'NightHawk', 'SwiftFox', 'BlazeKick', 'ZenMaster',
                'PixelAce', 'TurboDash', 'ShadowStrike', 'LunarWolf', 'CyberCat',
                'NeonTiger', 'FrostByte', 'StarDust', 'RapidFire', 'SilentX',
                'ThunderBolt', 'MysticOwl', 'IronFist', 'WaveRider', 'DarkPhoenix'
            ];

            function generateFakeLeaderboard(playerBest) {
                const usedNames = new Set();
                const entries = [];
                const baseScores = [];
                for (let i = 0; i < 10; i++) {
                    let score = playerBest > 0 ?
                        Math.max(1, Math.round(playerBest + (Math.random() - 0.5) * playerBest * 1.5)) :
                        Math.floor(Math.random() * 30) + 1;
                    baseScores.push(score);
                }
                baseScores.sort((a, b) => b - a);
                for (let i = 0; i < 10; i++) {
                    let name;
                    do { name = FAKE_NAMES_POOL[Math.floor(Math.random() * FAKE_NAMES_POOL.length)]; }
                    while (usedNames.has(name) && usedNames.size < FAKE_NAMES_POOL.length);
                    usedNames.add(name);
                    entries.push({
                        name,
                        score: baseScores[i],
                        isPlayer: false,
                        avatar: ['🦊', '🐺', '🐱', '🐯', '🦅', '🐉', '🦈', '🦋', '🐲', '🔥'][i]
                    });
                }
                return entries;
            }

            function updateLeaderboardWithPlayer(playerName, playerRecord) {
                let lb = loadLeaderboard();
                lb = lb.filter(e => !e.isPlayer);
                lb.push({ name: playerName || 'Игрок', score: playerRecord, isPlayer: true, avatar: '😎' });
                lb.sort((a, b) => b.score - a.score);
                const top10 = lb.slice(0, 10);
                const playerEntry = lb.find(e => e.isPlayer);
                if (playerEntry && !top10.find(e => e.isPlayer)) top10.push(playerEntry);
                saveLeaderboard(top10);
                return top10;
            }

            // ==================== ЭКРАНЫ ====================
            function showScreen(screen) {
                [menuScreen, gameScreen, leaderboardScreen, settingsScreen].forEach(s => s.classList.add(
                    'screen-hidden'));
                screen.classList.remove('screen-hidden');

                const gs = document.getElementById('game-screen');
                if (screen === gameScreen) {
                    if (!bannerClosed && adLoaded) {
                        adBannerContainer.style.display = 'flex';
                        if (gs) gs.style.paddingBottom = '50px';
                    }
                } else {
                    adBannerContainer.style.display = 'none';
                    if (gs) gs.style.paddingBottom = '0';
                }
            }

            function showMenu() {
                showScreen(menuScreen);
                updateMenuUI();
            }

            function showGame() {
                showScreen(gameScreen);
                startGame();
            }

            function showLeaderboard() {
                showScreen(leaderboardScreen);
                renderLeaderboard();
            }

            function showSettings() {
                showScreen(settingsScreen);
                const player = loadPlayerData();
                nameInput.value = player.name;
                saveConfirm.classList.remove('show');
            }

            function updateMenuUI() {
                const player = loadPlayerData();
                menuPlayerName.textContent = player.name;
                menuRecordValue.textContent = player.record;
                hudRecord.textContent = player.record;
                updateMusicButton();
            }

            function savePlayerName() {
                const newName = nameInput.value.trim() || 'Игрок';
                const player = loadPlayerData();
                player.name = newName;
                savePlayerData(player);
                updateMenuUI();
                updateLeaderboardWithPlayer(player.name, player.record);
                saveConfirm.classList.add('show');
                setTimeout(() => saveConfirm.classList.remove('show'), 1500);
            }

            // ==================== ИГРА ====================
            const TOTAL_LANES = 5;
            let currentLane = 2;
            let score = 0;
            let gameRunning = false;
            let ballY = -8;
            const BASE_SPEED = 28;
            const MAX_SPEED = 90;
            let ballSpeed = BASE_SPEED;
            let laneSwitchTimer = 0;
            let laneSwitchInterval = 700;
            let lastTapTime = 0;
            const TAP_COOLDOWN = 200;
            let animationFrameId = null;
            let lastTimestamp = 0;
            let playerData = null;

            function getContainerHeight() { return container.clientHeight; }

            function getContainerWidth() { return container.clientWidth; }

            function getLaneWidth() { return getContainerWidth() / TOTAL_LANES; }

            function getFireLineY() { return getContainerHeight() / 2; }

            function getBallPixelY() { return (ballY / 100) * getContainerHeight(); }

            function getBallPixelX() {
                const laneWidth = getLaneWidth();
                return currentLane * laneWidth + laneWidth / 2;
            }

            function updateBallPosition() {
                ball.style.left = getBallPixelX() + 'px';
                ball.style.top = getBallPixelY() + 'px';
            }

            function getLaneFromX(tapX) {
                const laneWidth = getLaneWidth();
                return Math.min(Math.floor(tapX / laneWidth), TOTAL_LANES - 1);
            }

            function highlightLane(laneIndex, type) {
                const laneEl = laneElements[laneIndex];
                if (!laneEl) return;
                const className = type === 'perfect' ? 'highlight-perfect' :
                    type === 'good' ? 'highlight-good' : 'highlight-miss';
                laneEl.classList.add(className);
                setTimeout(() => laneEl.classList.remove(className), 200);
            }

            function spawnParticles(x, y, color, count = 18) {
                for (let i = 0; i < count; i++) {
                    const shard = document.createElement('div');
                    shard.className = 'particle-shard';
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 30 + Math.random() * 80;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance;
                    const rot = Math.random() * 360;
                    const size = 2 + Math.random() * 6;
                    shard.style.cssText = `
                        left: ${x}px; top: ${y}px;
                        width: ${size}px; height: ${size}px;
                        background: ${color};
                        --dx: ${dx}px; --dy: ${dy}px; --rot: ${rot}deg;
                        animation-duration: ${0.4 + Math.random() * 0.6}s;
                    `;
                    particlesContainer.appendChild(shard);
                    setTimeout(() => shard.remove(), 800);
                }
            }

            function clearParticles() { particlesContainer.innerHTML = ''; }

            function shakeScreen() {
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 150);
            }

            function showFloatScore(x, y, points, type) {
                const el = document.createElement('div');
                el.className = 'float-score';
                if (type === 'perfect') el.classList.add('perfect-float');
                if (type === 'good') el.classList.add('good-float');
                el.textContent = '+' + points;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                container.appendChild(el);
                setTimeout(() => el.remove(), 800);
            }

            function handleTap(e) {
                if (!gameRunning) return;
                getSfxCtx();
                const now = Date.now();
                if (now - lastTapTime < TAP_COOLDOWN) return;
                lastTapTime = now;
                const rect = container.getBoundingClientRect();
                const tapX = e.clientX - rect.left;
                const tappedLane = getLaneFromX(tapX);
                if (tappedLane !== currentLane) {
                    highlightLane(tappedLane, 'miss');
                    ball.classList.add('miss-hit');
                    vibrate(200);
                    soundMiss();
                    shakeScreen();
                    endGame();
                    return;
                }
                const fireLineY = getFireLineY();
                const ballPixelY = getBallPixelY();
                const ballPixelX = getBallPixelX();
                const distance = Math.abs(ballPixelY - fireLineY);
                const PERFECT_WINDOW = 25;
                const GOOD_WINDOW = 50;
                if (distance <= PERFECT_WINDOW) {
                    ball.classList.add('perfect-hit');
                    highlightLane(currentLane, 'perfect');
                    score += 3;
                    vibrate([10, 30, 10]);
                    soundPerfect();
                    spawnParticles(ballPixelX, ballPixelY, '#ffd700', 30);
                    showFloatScore(ballPixelX, ballPixelY - 20, 3, 'perfect');
                    ballSpeed = Math.min(MAX_SPEED, ballSpeed + 2.5);
                    laneSwitchInterval = Math.max(350, laneSwitchInterval - 20);
                    resetBall();
                    updateScoreDisplay();
                } else if (distance <= GOOD_WINDOW) {
                    ball.classList.add('good-hit');
                    highlightLane(currentLane, 'good');
                    score += 1;
                    vibrate(10);
                    soundGood();
                    spawnParticles(ballPixelX, ballPixelY, '#00e676', 14);
                    showFloatScore(ballPixelX, ballPixelY - 20, 1, 'good');
                    ballSpeed = Math.min(MAX_SPEED, ballSpeed + 1.0);
                    laneSwitchInterval = Math.max(350, laneSwitchInterval - 8);
                    resetBall();
                    updateScoreDisplay();
                } else {
                    ball.classList.add('miss-hit');
                    highlightLane(currentLane, 'miss');
                    vibrate(200);
                    soundMiss();
                    spawnParticles(ballPixelX, ballPixelY, '#ff1744', 25);
                    shakeScreen();
                    endGame();
                }
            }

            function resetBall() {
                ball.classList.remove('perfect-hit', 'good-hit', 'miss-hit');
                void ball.offsetWidth;
                ballY = -8;
                currentLane = Math.floor(Math.random() * TOTAL_LANES);
                laneSwitchTimer = 0;
                updateBallPosition();
            }

            function updateScoreDisplay() {
                currentScoreEl.textContent = score;
                if (score > playerData.record) {
                    hudRecord.textContent = score;
                    hudRecord.style.color = '#ffd700';
                }
            }

            function endGame() {
                gameRunning = false;
                ball.style.display = 'none';
                let isNewRecord = false;
                if (score > playerData.record) {
                    playerData.record = score;
                    isNewRecord = true;
                }
                playerData.gamesPlayed++;
                savePlayerData(playerData);
                updateLeaderboardWithPlayer(playerData.name, playerData.record);
                goFinalScore.textContent = score;
                if (isNewRecord) goNewRecord.classList.add('show');
                else goNewRecord.classList.remove('show');
                gameOverInline.classList.add('active');
                updateMenuUI();
            }

            function startGame() {
                const pd = loadPlayerData();
                playerData = pd;
                score = 0;
                ballSpeed = BASE_SPEED;
                laneSwitchInterval = 700;
                laneSwitchTimer = 0;
                currentLane = Math.floor(Math.random() * TOTAL_LANES);
                ballY = -8;
                lastTapTime = 0;
                gameRunning = true;
                currentScoreEl.textContent = '0';
                hudRecord.textContent = playerData.record;
                hudRecord.style.color = '';
                hint.style.opacity = '1';
                ball.style.display = '';
                ball.classList.remove('perfect-hit', 'good-hit', 'miss-hit');
                void ball.offsetWidth;
                clearParticles();
                gameOverInline.classList.remove('active');
                goNewRecord.classList.remove('show');
                laneElements.forEach(l => l.classList.remove('highlight-perfect', 'highlight-good', 'highlight-miss'));
                updateBallPosition();
                lastTimestamp = performance.now();
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(gameLoop);
                updateMenuUI();
            }

            function gameLoop(timestamp) {
                if (!gameRunning) {
                    animationFrameId = requestAnimationFrame(gameLoop);
                    return;
                }
                if (!lastTimestamp) lastTimestamp = timestamp;
                let dt = timestamp - lastTimestamp;
                lastTimestamp = timestamp;
                if (dt > 200) dt = 16;
                const dtSeconds = dt / 1000;
                ballY += ballSpeed * dtSeconds;
                laneSwitchTimer += dt;
                const fireLineYPercent = 50;
                const LOCK_ZONE = 22;
                const ballNearFireLine = ballY > (fireLineYPercent - LOCK_ZONE / 2) &&
                    ballY < (fireLineYPercent + LOCK_ZONE / 2);
                if (!ballNearFireLine && laneSwitchTimer >= laneSwitchInterval) {
                    laneSwitchTimer = 0;
                    laneSwitchInterval = 400 + Math.random() * 500;
                    let newLane;
                    do { newLane = Math.floor(Math.random() * TOTAL_LANES); }
                    while (newLane === currentLane && TOTAL_LANES > 1);
                    currentLane = newLane;
                }
                updateBallPosition();
                if (ballY > 105) {
                    vibrate(200);
                    soundMiss();
                    shakeScreen();
                    endGame();
                }
                if (ballY > 15 && hint.style.opacity !== '0') {
                    hint.style.opacity = '0';
                }
                animationFrameId = requestAnimationFrame(gameLoop);
            }

            // ==================== ТАБЛИЦА ЛИДЕРОВ ====================
            function getPlayerRank(lb) {
                const entry = lb.find(e => e.isPlayer);
                if (!entry) return '-';
                const index = lb.indexOf(entry);
                const top10 = lb.slice(0, 10);
                if (top10.find(e => e.isPlayer)) return index + 1;
                return (index + 1);
            }

            function renderLeaderboard() {
                const player = loadPlayerData();
                let lb = loadLeaderboard();
                if (!lb.find(e => e.isPlayer)) {
                    lb.push({ name: player.name, score: player.record, isPlayer: true, avatar: '😎' });
                    lb.sort((a, b) => b.score - a.score);
                    saveLeaderboard(lb);
                }
                lbList.innerHTML = '';
                const top10 = lb.slice(0, 10);
                const playerEntry = lb.find(e => e.isPlayer);
                const playerRank = getPlayerRank(lb);
                if (top10.length === 0) {
                    lbEmpty.style.display = 'block';
                    lbPlayerCard.style.display = 'none';
                } else {
                    lbEmpty.style.display = 'none';
                    if (playerEntry) {
                        lbPlayerCard.style.display = 'flex';
                        lbPlayerName.textContent = player.name || 'Вы';
                        lbPlayerScore.textContent = player.record;
                        const rankDisplay = playerRank !== '-' ?
                            (playerRank <= 10 ? `#${playerRank} в топе` : `Место: ${playerRank}`) :
                            'Без рекорда';
                        lbPlayerRankTag.textContent = rankDisplay;
                    } else {
                        lbPlayerCard.style.display = 'none';
                    }
                    top10.forEach((entry, index) => {
                        const row = document.createElement('div');
                        row.className = 'lb-row';
                        if (index === 0) row.classList.add('top-1');
                        if (index === 1) row.classList.add('top-2');
                        if (index === 2) row.classList.add('top-3');
                        if (entry.isPlayer) row.classList.add('is-player');
                        const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index ===
                            2 ? 'rank-3' : 'rank-other';
                        const medalEmoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                        row.innerHTML = `
                            <div class="rank-num ${rankClass}">${medalEmoji || '#' + (index + 1)}</div>
                            <div class="rank-avatar">${entry.avatar || '👤'}</div>
                            <div class="rank-name">${entry.name}${entry.isPlayer ? ' (вы)' : ''}</div>
                            <div class="rank-score">${entry.score}</div>
                        `;
                        lbList.appendChild(row);
                    });
                    if (playerEntry && !top10.find(e => e.isPlayer)) {
                        const separator = document.createElement('div');
                        separator.style.cssText =
                            'text-align:center;color:var(--text-secondary);padding:8px;font-size:11px;letter-spacing:2px;';
                        separator.textContent = '···';
                        lbList.appendChild(separator);
                        const playerIndex = lb.indexOf(playerEntry);
                        const row = document.createElement('div');
                        row.className = 'lb-row is-player';
                        row.innerHTML = `
                            <div class="rank-num rank-other">#${playerIndex + 1}</div>
                            <div class="rank-avatar">😎</div>
                            <div class="rank-name">${playerEntry.name} (вы)</div>
                            <div class="rank-score">${playerEntry.score}</div>
                        `;
                        lbList.appendChild(row);
                    }
                }
            }

            // ==================== ОБРАБОТЧИКИ ====================
            btnPlay.addEventListener('click', () => {
                getSfxCtx();
                showGame();
            });

            btnMusic.addEventListener('click', () => {
                toggleMusic();
                saveMusicPref(musicPlaying);
            });

            btnOpenLb.addEventListener('click', showLeaderboard);
            btnCloseLb.addEventListener('click', showMenu);
            btnOpenSettings.addEventListener('click', showSettings);
            btnCloseSettings.addEventListener('click', showMenu);

            btnSaveName.addEventListener('click', savePlayerName);
            nameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') savePlayerName();
            });

            goRetry.addEventListener('click', (e) => {
                e.stopPropagation();
                startGame();
            });

            goMenu.addEventListener('click', (e) => {
                e.stopPropagation();
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                gameRunning = false;
                showMenu();
            });

            menuPlayerName.addEventListener('click', showSettings);

            container.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                handleTap(e);
            });

            document.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            // ==================== ИНИЦИАЛИЗАЦИЯ ====================
            function init() {
                const player = loadPlayerData();
                if (!player.name) player.name = 'Игрок';
                if (typeof player.record !== 'number') player.record = 0;
                if (typeof player.gamesPlayed !== 'number') player.gamesPlayed = 0;
                savePlayerData(player);
                let lb = loadLeaderboard();
                if (!lb.find(e => e.isPlayer)) {
                    lb = updateLeaderboardWithPlayer(player.name, player.record);
                }
                saveLeaderboard(lb);
                updateMenuUI();
                showMenu();
                if (loadMusicPref()) {
                    setTimeout(() => startMusic(), 500);
                }
            }

            init();
            window.addEventListener('resize', () => {
                checkOrientation();
                if (gameRunning) updateBallPosition();
            });

            console.log('🎯 "Дай Пять" готов!');
            console.log('   🎵 Музыка: кнопка в меню');
            console.log('   📢 Реклама: баннер Яндекса внизу');
            console.log('   👑 Рекорды сохраняются');
        })();
    </script>
</body>
</html>
